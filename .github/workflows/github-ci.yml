name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: "20"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Build with warnings-as-errors
        run: dotnet build Receipts.slnx --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: >-
          dotnet test Receipts.slnx
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --settings scripts/tests/coverlet.runsettings
          --results-directory TestResults

      - name: Merge coverage reports
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: TestResults/merged
          reporttypes: Cobertura;MarkdownSummaryGithub

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-backend
          path: TestResults/merged/SummaryGithub.md

  frontend-test:
    name: Frontend Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/client

      - name: Run tests with coverage
        run: npm run coverage
        working-directory: src/client

      - name: Generate coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: src/client/coverage/cobertura-coverage.xml
          format: markdown
          output: both
          badge: false
          thresholds: '0 0'
          fail_below_min: false

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-frontend
          path: code-coverage-results.md

  lint:
    name: Code Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Check formatting
        run: dotnet format Receipts.slnx --no-restore --verify-no-changes

  security:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list Receipts.slnx package --vulnerable 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected!"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run Snyk Code analysis
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=medium --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

      - name: Sync Snyk findings to Linear
        if: always()
        run: node scripts/create-linear-issues.mjs snyk.sarif
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        continue-on-error: true

  api-compat:
    name: API Breaking Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'breaking-changes-allowed')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Check for breaking API changes
        run: node scripts/check-breaking.mjs origin/${{ github.base_ref }}
