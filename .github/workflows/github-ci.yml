name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
    branches: ["main"]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: "20"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Build with warnings-as-errors
        run: dotnet build Receipts.slnx --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: >-
          dotnet test Receipts.slnx
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --settings scripts/tests/coverlet.runsettings
          --results-directory TestResults

      - name: Merge coverage reports
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: TestResults/merged
          reporttypes: Cobertura;MarkdownSummaryGithub

      - name: Enforce backend coverage threshold
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/merged/Cobertura.xml
          format: markdown
          output: both
          badge: false
          thresholds: '70 65'
          fail_below_min: true

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-backend
          path: TestResults/merged/SummaryGithub.md

  frontend-test:
    name: Frontend Test & Coverage
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/client

      - name: Regenerate types and check for drift
        run: |
          npm run generate:types
          npm run build
        working-directory: src/client

      - name: Run tests with coverage
        run: npm run coverage
        working-directory: src/client

      - name: Generate coverage summary
        if: success() || failure()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: src/client/coverage/cobertura-coverage.xml
          format: markdown
          output: both
          badge: false
          thresholds: '80 80'
          fail_below_min: true

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-frontend
          path: code-coverage-results.md

  lint:
    name: Code Formatting
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Check formatting
        run: dotnet format Receipts.slnx --no-restore --verify-no-changes

  security:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list Receipts.slnx package --vulnerable 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected!"
            exit 1
          fi

  docker-build:
    name: Docker Build Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha,scope=docker-build-check
          cache-to: type=gha,mode=min,scope=docker-build-check

  api-compat:
    name: API Breaking Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'breaking-changes-allowed')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Check for breaking API changes
        run: node scripts/check-breaking.mjs origin/${{ github.base_ref }}

  pr-title:
    name: PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      pull-requests: read

    steps:
      - uses: amannn/action-semantic-pull-request@v5
        with:
          # Types allowed by the project's Conventional Commits convention
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
          # Scopes allowed by the project (see AGENTS.md § Commit Convention)
          scopes: |
            api
            client
            domain
            application
            infrastructure
            infra
            common
            shared
            ci
            hooks
          # Require lowercase subject
          subjectPattern: ^[a-z].*$
          subjectPatternError: |
            The PR title subject must start with a lowercase letter.
            Example: "feat(api): add pagination support"
          # Skip validation for release-please PRs
          ignoreLabels: |
            autorelease: pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
