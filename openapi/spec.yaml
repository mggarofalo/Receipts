openapi: 3.1.0
info:
  title: Receipts API
  version: 1.0.0
  description: |
    Receipts management API. Supports header-based versioning via the
    `api-version` header (e.g. `api-version: 1.0`). When omitted, the
    default version (currently 1.0) is assumed.

paths:
  /api/health:
    get:
      operationId: Get
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                {}

  # ──────────────────────────────────────────────
  # Metadata
  # ──────────────────────────────────────────────

  /api/metadata/enums:
    get:
      operationId: GetEnumMetadata
      tags: [Metadata]
      summary: Get all enum values with display labels
      security:
        - BearerAuth: []
        - ApiKey: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnumMetadataResponse"

  # ──────────────────────────────────────────────
  # Accounts
  # ──────────────────────────────────────────────

  /api/accounts/{id}:
    get:
      operationId: GetAccountById
      tags: [Accounts]
      summary: Get an account by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateAccount
      tags: [Accounts]
      summary: Update a single account
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found
    delete:
      operationId: DeleteAccount
      tags: [Accounts]
      summary: Hard-delete an account
      description: >
        Permanently deletes an account. Requires the Admin role. Returns 409
        Conflict if transactions reference this account.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
        "409":
          description: Conflict — transactions reference this account
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  transactionCount:
                    type: integer
                required:
                  - message
                  - transactionCount

  /api/accounts:
    get:
      operationId: GetAllAccounts
      tags: [Accounts]
      summary: Get all accounts
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateAccount
      tags: [Accounts]
      summary: Create a single account
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
  /api/accounts/batch:
    post:
      operationId: CreateAccounts
      tags: [Accounts]
      summary: Create accounts in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountResponse"
    put:
      operationId: UpdateAccounts
      tags: [Accounts]
      summary: Update accounts in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  # ──────────────────────────────────────────────
  # Categories
  # ──────────────────────────────────────────────

  /api/categories/{id}:
    get:
      operationId: GetCategoryById
      tags: [Categories]
      summary: Get a category by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateCategory
      tags: [Categories]
      summary: Update a single category
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found
    delete:
      operationId: DeleteCategory
      tags: [Categories]
      summary: Soft-delete a category
      description: >
        Soft-deletes a category and cascade soft-deletes its subcategories.
        Returns 409 Conflict if receipt items reference this category or any
        of its subcategories.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
        "409":
          description: Conflict — receipt items reference this category or its subcategories
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  receiptItemCount:
                    type: integer

  /api/categories/deleted:
    get:
      operationId: GetDeletedCategories
      tags: [Categories]
      summary: Get all soft-deleted categories
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/categories/{id}/restore:
    post:
      operationId: RestoreCategory
      tags: [Categories]
      summary: Restore a soft-deleted category
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/categories:
    get:
      operationId: GetAllCategories
      tags: [Categories]
      summary: Get all categories
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateCategory
      tags: [Categories]
      summary: Create a single category
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
  /api/categories/batch:
    post:
      operationId: CreateCategories
      tags: [Categories]
      summary: Create categories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
    put:
      operationId: UpdateCategories
      tags: [Categories]
      summary: Update categories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  # ──────────────────────────────────────────────
  # Subcategories
  # ──────────────────────────────────────────────

  /api/subcategories/{id}:
    get:
      operationId: GetSubcategoryById
      tags: [Subcategories]
      summary: Get a subcategory by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcategoryResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateSubcategory
      tags: [Subcategories]
      summary: Update a single subcategory
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubcategoryRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found
    delete:
      operationId: DeleteSubcategory
      tags: [Subcategories]
      summary: Soft-delete a subcategory
      description: >
        Soft-deletes a subcategory. Returns 409 Conflict if receipt items
        reference this subcategory.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
        "409":
          description: Conflict — receipt items reference this subcategory
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  receiptItemCount:
                    type: integer
                required:
                  - message
                  - receiptItemCount

  /api/subcategories/deleted:
    get:
      operationId: GetDeletedSubcategories
      tags: [Subcategories]
      summary: Get all soft-deleted subcategories
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcategoryListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/subcategories/{id}/restore:
    post:
      operationId: RestoreSubcategory
      tags: [Subcategories]
      summary: Restore a soft-deleted subcategory
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/subcategories:
    get:
      operationId: GetAllSubcategories
      tags: [Subcategories]
      summary: Get all subcategories
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcategoryListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateSubcategory
      tags: [Subcategories]
      summary: Create a single subcategory
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcategoryRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcategoryResponse"
  /api/subcategories/batch:
    post:
      operationId: CreateSubcategories
      tags: [Subcategories]
      summary: Create subcategories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CreateSubcategoryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubcategoryResponse"
    put:
      operationId: UpdateSubcategories
      tags: [Subcategories]
      summary: Update subcategories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateSubcategoryRequest"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  # ──────────────────────────────────────────────
  # Item Templates
  # ──────────────────────────────────────────────

  /api/item-templates/{id}:
    get:
      operationId: GetItemTemplateById
      tags: [ItemTemplates]
      summary: Get an item template by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateItemTemplate
      tags: [ItemTemplates]
      summary: Update a single item template
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemTemplateRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/item-templates:
    get:
      operationId: GetAllItemTemplates
      tags: [ItemTemplates]
      summary: Get all item templates
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateItemTemplate
      tags: [ItemTemplates]
      summary: Create a single item template
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemTemplateRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateResponse"
    delete:
      operationId: DeleteItemTemplates
      tags: [ItemTemplates]
      summary: Delete item templates
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /api/item-templates/deleted:
    get:
      operationId: GetDeletedItemTemplates
      tags: [ItemTemplates]
      summary: Get all soft-deleted item templates
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/item-templates/similar:
    get:
      operationId: GetSimilarItems
      tags: [ItemTemplates]
      summary: Find similar items by trigram similarity
      description: |
        Returns items from templates and receipt history that are similar to the
        provided search text, ranked by trigram similarity score.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Partial or full description text to search for
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 5
            minimum: 1
            maximum: 20
          description: Maximum number of results to return
        - name: threshold
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 0.3
            minimum: 0.0
            maximum: 1.0
          description: Minimum similarity score (0.0–1.0)
        - name: semantic
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: Whether to include semantic (embedding-based) similarity in ranking
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimilarItemResponse"

  /api/item-templates/category-suggestions:
    get:
      operationId: GetCategorySuggestions
      tags: [ItemTemplates]
      summary: Get category/subcategory recommendations for an item description
      description: |
        Returns ranked category and subcategory suggestions based on semantic and
        trigram similarity to existing items and receipt history.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Item description to get category recommendations for
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 5
            minimum: 1
            maximum: 20
          description: Maximum number of recommendations to return
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryRecommendationResponse"

  /api/item-templates/{id}/restore:
    post:
      operationId: RestoreItemTemplate
      tags: [ItemTemplates]
      summary: Restore a soft-deleted item template
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  # ──────────────────────────────────────────────
  # Receipts
  # ──────────────────────────────────────────────

  /api/receipts/{id}:
    get:
      operationId: GetReceiptById
      tags: [Receipts]
      summary: Get a receipt by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateReceipt
      tags: [Receipts]
      summary: Update a single receipt
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReceiptRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/receipts:
    get:
      operationId: GetAllReceipts
      tags: [Receipts]
      summary: Get all receipts
      security:
        - BearerAuth: []
        - ApiKey: []
