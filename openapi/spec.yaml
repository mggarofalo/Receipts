    put:
      operationId: UpdateSubcategories
      tags: [Subcategories]
      summary: Update subcategories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateSubcategoryRequest"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  # ──────────────────────────────────────────────
  # Item Templates
  # ──────────────────────────────────────────────

  /api/item-templates/{id}:
    get:
      operationId: GetItemTemplateById
      tags: [ItemTemplates]
      summary: Get an item template by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateItemTemplate
      tags: [ItemTemplates]
      summary: Update a single item template
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemTemplateRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/item-templates:
    get:
      operationId: GetAllItemTemplates
      tags: [ItemTemplates]
      summary: Get all item templates
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateItemTemplate
      tags: [ItemTemplates]
      summary: Create a single item template
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemTemplateRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateResponse"
    delete:
      operationId: DeleteItemTemplates
      tags: [ItemTemplates]
      summary: Delete item templates
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /api/item-templates/deleted:
    get:
      operationId: GetDeletedItemTemplates
      tags: [ItemTemplates]
      summary: Get all soft-deleted item templates
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemTemplateListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/item-templates/similar:
    get:
      operationId: GetSimilarItems
      tags: [ItemTemplates]
      summary: Find similar items by trigram similarity
      description: |
        Returns items from templates and receipt history that are similar to the
        provided search text, ranked by trigram similarity score.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Partial or full description text to search for
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 5
            minimum: 1
            maximum: 20
          description: Maximum number of results to return
        - name: threshold
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 0.3
            minimum: 0.0
            maximum: 1.0
          description: Minimum similarity score (0.0–1.0)
        - name: semantic
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: Whether to include semantic (embedding-based) similarity in ranking
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimilarItemResponse"

  /api/item-templates/category-suggestions:
    get:
      operationId: GetCategorySuggestions
      tags: [ItemTemplates]
      summary: Get category/subcategory recommendations for an item description
      description: |
        Returns ranked category and subcategory suggestions based on semantic and
        trigram similarity to existing items and receipt history.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Item description to get category recommendations for
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 5
            minimum: 1
            maximum: 20
          description: Maximum number of recommendations to return
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryRecommendationResponse"

  /api/item-templates/{id}/restore:
    post:
      operationId: RestoreItemTemplate
      tags: [ItemTemplates]
      summary: Restore a soft-deleted item template
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
