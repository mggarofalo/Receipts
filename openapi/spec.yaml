  # ──────────────────────────────────────────────
  # Dashboard
  # ──────────────────────────────────────────────

  /api/dashboard/summary:
    get:
      operationId: GetDashboardSummary
      tags: [Dashboard]
      summary: Get dashboard summary statistics
      description: Returns high-level stats for a date range including total receipts, total spent, average trip amount, and most-used account/category.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (ISO date string). Defaults to 30 days ago.
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (ISO date string). Defaults to today.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/dashboard/spending-over-time:
    get:
      operationId: GetSpendingOverTime
      tags: [Dashboard]
      summary: Get spending over time
      description: Returns time-series spending data bucketed by the specified granularity.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (ISO date string). Defaults to 30 days ago.
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (ISO date string). Defaults to today.
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: monthly
          description: Time bucket granularity.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingOverTimeResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/dashboard/spending-by-category:
    get:
      operationId: GetSpendingByCategory
      tags: [Dashboard]
      summary: Get spending grouped by category
      description: Returns spending amounts grouped by receipt item category.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (ISO date string). Defaults to 30 days ago.
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (ISO date string). Defaults to today.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of categories to return (top N).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingByCategoryResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/dashboard/spending-by-account:
    get:
      operationId: GetSpendingByAccount
      tags: [Dashboard]
      summary: Get spending grouped by account
      description: Returns spending amounts grouped by payment account.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (ISO date string). Defaults to 30 days ago.
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (ISO date string). Defaults to today.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendingByAccountResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

components:
  schemas:
    # ── Dashboard ──────────────────────────────────

    DashboardSummaryResponse:
      type: object
      required: [totalReceipts, totalSpent, averageTripAmount, mostUsedAccount, mostUsedCategory]
      properties:
        totalReceipts:
          type: integer
          format: int32
        totalSpent:
          type: number
          format: double
        averageTripAmount:
          type: number
          format: double
        mostUsedAccount:
          $ref: "#/components/schemas/NameCountPair"
        mostUsedCategory:
          $ref: "#/components/schemas/NameCountPair"

    NameCountPair:
      type: object
      required: [count]
      properties:
        name:
          type:
            - string
            - "null"
        count:
          type: integer
          format: int32

    SpendingOverTimeResponse:
      type: object
      required: [buckets]
      properties:
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/SpendingBucket"

    SpendingBucket:
      type: object
      required: [period, amount]
      properties:
        period:
          type: string
        amount:
          type: number
          format: double

    SpendingByCategoryResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SpendingCategoryItem"

    SpendingCategoryItem:
      type: object
      required: [categoryName, amount, percentage]
      properties:
        categoryName:
          type: string
        amount:
          type: number
          format: double
        percentage:
          type: number
          format: double

    SpendingByAccountResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SpendingAccountItem"

    SpendingAccountItem:
      type: object
      required: [accountId, accountName, amount, percentage]
      properties:
        accountId:
          type: string
          format: uuid
        accountName:
          type: string
        amount:
          type: number
          format: double
        percentage:
          type: number
          format: double

    # ── Account ──────────────────────────────────

    CreateAccountRequest:
      type: object
      required: [accountCode, name, isActive]
      properties:
        accountCode:
          type: string
        name:
          type: string
        isActive:
          type: boolean

    UpdateAccountRequest:
      type: object
      required: [id, accountCode, name, isActive]
      properties:
        id:
          type: string
          format: uuid
        accountCode:
          type: string
        name:
          type: string
        isActive:
          type: boolean

    AccountResponse:
      type: object
      required: [id, accountCode, name, isActive]
      properties:
        id:
          type: string
          format: uuid
        accountCode:
          type: string
        name:
          type: string
        isActive:
          type: boolean

    AccountListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AccountResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Category ──────────────────────────────────

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"

    UpdateCategoryRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"

    CategoryResponse:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"

    CategoryListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CategoryResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Subcategory ─────────────────────────────

    CreateSubcategoryRequest:
      type: object
      required: [name, categoryId]
      properties:
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"

    UpdateSubcategoryRequest:
      type: object
      required: [id, name, categoryId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"

    SubcategoryResponse:
      type: object
      required: [id, name, categoryId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"

    SubcategoryListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SubcategoryResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Item Template ──────────────────────────────

    CreateItemTemplateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
        defaultCategory:
          type:
            - string
            - "null"
        defaultSubcategory:
          type:
            - string
            - "null"
        defaultUnitPrice:
          type:
            - number
            - "null"
          format: double
        defaultPricingMode:
          type:
            - string
            - "null"
        defaultItemCode:
          type:
            - string
            - "null"

    UpdateItemTemplateRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"
        defaultCategory:
          type:
            - string
            - "null"
        defaultSubcategory:
          type:
            - string
            - "null"
        defaultUnitPrice:
          type:
            - number
            - "null"
          format: double
        defaultPricingMode:
          type:
            - string
            - "null"
        defaultItemCode:
          type:
            - string
            - "null"

    ItemTemplateResponse:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"
        defaultCategory:
          type:
            - string
            - "null"
        defaultSubcategory:
          type:
            - string
            - "null"
        defaultUnitPrice:
          type:
            - number
            - "null"
          format: double
        defaultUnitPriceCurrency:
          type:
            - string
            - "null"
          description: "Currency code for the default unit price (e.g., 'USD')"
        defaultPricingMode:
          type:
            - string
            - "null"
        defaultItemCode:
          type:
            - string
            - "null"

    ItemTemplateListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ItemTemplateResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    SimilarItemResponseSource:
      type: string
      description: "'template' if from item templates, 'history' if from receipt item history"
      enum: [template, history]

    SimilarItemResponse:
      type: object
      required: [name, similarity, combinedScore, source]
      properties:
        name:
          type: string
        similarity:
          type: number
          format: double
          description: Trigram similarity score (0.0–1.0)
        semanticSimilarity:
          type:
            - number
            - "null"
          format: double
          description: Embedding cosine similarity score (0.0–1.0), null if embeddings unavailable
        combinedScore:
          type: number
          format: double
          description: Weighted combination of trigram and semantic similarity
        source:
          $ref: "#/components/schemas/SimilarItemResponseSource"
        defaultCategory:
          type:
            - string
            - "null"
        defaultSubcategory:
          type:
            - string
            - "null"
        defaultUnitPrice:
          type:
            - number
            - "null"
          format: double
        defaultPricingMode:
          type:
            - string
            - "null"
        defaultItemCode:
          type:
            - string
            - "null"

    CategoryRecommendationResponse:
      type: object
      required: [category, confidence, occurrenceCount]
      properties:
        category:
          type: string
        subcategory:
          type:
            - string
            - "null"
        confidence:
          type: number
          format: double
          description: Weighted confidence score based on similarity of source items
        occurrenceCount:
          type: integer
          format: int32
          description: Number of similar items with this category

    # ── Receipt ──────────────────────────────────

    CreateReceiptRequest:
      type: object
      required: [location, date, taxAmount]
      properties:
        location:
          type: string
        date:
          type: string
          format: date
        taxAmount:
          type: number
          format: double

    UpdateReceiptRequest:
      type: object
      required: [id, location, date, taxAmount]
      properties:
        id:
          type: string
          format: uuid
        location:
          type: string
        date:
          type: string
          format: date
        taxAmount:
          type: number
          format: double

    ReceiptResponse:
      type: object
      required: [id, location, date, taxAmount]
      properties:
        id:
          type: string
          format: uuid
        location:
          type: string
        date:
          type: string
          format: date
        taxAmount:
          type: number
          format: double

    ReceiptListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    CreateCompleteReceiptRequest:
      type: object
      required: [receipt, transactions, items]
      properties:
        receipt:
          $ref: "#/components/schemas/CreateReceiptRequest"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/CreateTransactionRequest"
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateReceiptItemRequest"

    CompleteReceiptResponse:
      type: object
      required: [receipt, transactions, items]
      properties:
        receipt:
          $ref: "#/components/schemas/ReceiptResponse"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionResponse"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptItemResponse"

    # ── Receipt Item ─────────────────────────────

    CreateReceiptItemRequest:
      type: object
      required: [description, quantity, unitPrice, category]
      properties:
        receiptItemCode:
          type: ["string", "null"]
        description:
          type: string
        quantity:
          type: number
          format: double
        unitPrice:
          type: number
          format: double
        category:
          type: string
        subcategory:
          type: ["string", "null"]
        pricingMode:
          type: string
          description: "Pricing mode: 'quantity' (qty x unit price) or 'flat' (single flat price)"
          default: quantity

    UpdateReceiptItemRequest:
      type: object
      required: [id, description, quantity, unitPrice, category]
      properties:
        id:
          type: string
          format: uuid
        receiptItemCode:
          type: ["string", "null"]
        description:
          type: string
        quantity:
          type: number
          format: double
        unitPrice:
          type: number
          format: double
        category:
          type: string
        subcategory:
          type: ["string", "null"]
        pricingMode:
          type: string
          description: "Pricing mode: 'quantity' (qty x unit price) or 'flat' (single flat price)"
          default: quantity

    ReceiptItemResponse:
      type: object
      required: [id, receiptId, description, quantity, unitPrice, category, pricingMode]
      properties:
        id:
          type: string
          format: uuid
        receiptId:
          type: string
          format: uuid
        receiptItemCode:
          type: ["string", "null"]
        description:
          type: string
        quantity:
          type: number
          format: double
        unitPrice:
          type: number
          format: double
        category:
          type: string
        subcategory:
          type: ["string", "null"]
        pricingMode:
          type: string
          description: "Pricing mode: 'quantity' (qty x unit price) or 'flat' (single flat price)"

    ReceiptItemListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptItemResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Transaction ──────────────────────────────

    CreateTransactionRequest:
      type: object
      required: [amount, date, accountId]
      properties:
        amount:
          type: number
          format: double
        date:
          type: string
          format: date
        accountId:
          type: string
          format: uuid

    UpdateTransactionRequest:
      type: object
      required: [id, amount, date, accountId]
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        date:
          type: string
          format: date
        accountId:
          type: string
          format: uuid

    TransactionResponse:
      type: object
      required: [id, receiptId, accountId, amount, date]
      properties:
        id:
          type: string
          format: uuid
        receiptId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        date:
          type: string
          format: date

    TransactionListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TransactionResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Adjustment ──────────────────────────────

    CreateAdjustmentRequest:
      type: object
      required: [type, amount]
      properties:
        type:
          type: string
          description: "Adjustment type: tip, discount, rounding, loyaltyRedemption, coupon, storeCredit, other"
        amount:
          type: number
          format: double
        description:
          type:
            - string
            - "null"
          description: "Required when type is 'other'"

    UpdateAdjustmentRequest:
      type: object
      required: [id, type, amount]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: "Adjustment type: tip, discount, rounding, loyaltyRedemption, coupon, storeCredit, other"
        amount:
          type: number
          format: double
        description:
          type:
            - string
            - "null"
          description: "Required when type is 'other'"

    AdjustmentResponse:
      type: object
      required: [id, receiptId, type, amount]
      properties:
        id:
          type: string
          format: uuid
        receiptId:
          type: string
          format: uuid
        type:
          type: string
        amount:
          type: number
          format: double
        description:
          type:
            - string
            - "null"

    AdjustmentListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdjustmentResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Aggregates (read-only) ───────────────────

    ValidationWarningResponse:
      type: object
      required: [property, message]
      properties:
        property:
          type: string
          description: "The property that triggered the warning"
        message:
          type: string
          description: "Human-readable warning message"
        severity:
          type: integer
          format: int32
          description: "Warning severity level (0=Info, 1=Warning)"

    ReceiptWithItemsResponse:
      type: object
      required: [receipt, items, adjustments, subtotal, adjustmentTotal, expectedTotal, warnings]
      properties:
        receipt:
          $ref: "#/components/schemas/ReceiptResponse"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptItemResponse"
        adjustments:
          type: array
          items:
            $ref: "#/components/schemas/AdjustmentResponse"
        subtotal:
          type: number
          format: double
          description: "Sum of all item TotalAmounts"
        adjustmentTotal:
          type: number
          format: double
          description: "Sum of all adjustment amounts"
        expectedTotal:
          type: number
          format: double
          description: "Subtotal + TaxAmount + AdjustmentTotal"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationWarningResponse"
          description: "Soft validation warnings (do not block saves)"

    TransactionAccountResponse:
      type: object
      required: [transaction, account]
      properties:
        transaction:
          $ref: "#/components/schemas/TransactionResponse"
        account:
          $ref: "#/components/schemas/AccountResponse"

    TripResponse:
      type: object
      required: [receipt, transactions, warnings]
      properties:
        receipt:
          $ref: "#/components/schemas/ReceiptWithItemsResponse"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionAccountResponse"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationWarningResponse"
          description: "Soft validation warnings including date consistency checks"

    # ── Audit ───────────────────────────────────────

    AuditLogDto:
      type: object
      required: [id, entityType, entityId, action, changesJson, changedAt]
      properties:
        id:
          type: string
          format: uuid
        entityType:
          type: string
        entityId:
          type: string
        action:
          type: string
        changesJson:
          type: string
        changedByUserId:
          type:
            - string
            - "null"
        changedByApiKeyId:
          type:
            - string
            - "null"
          format: uuid
        changedAt:
          type: string
          format: date-time
        ipAddress:
          type:
            - string
            - "null"

    AuditLogListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogDto"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Auth Audit ────────────────────────────────

    AuthAuditEntryDto:
      type: object
      required: [id, eventType, success, timestamp]
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
        userId:
          type:
            - string
            - "null"
        apiKeyId:
          type:
            - string
            - "null"
          format: uuid
        username:
          type:
            - string
            - "null"
        success:
          type: boolean
        failureReason:
          type:
            - string
            - "null"
        ipAddress:
          type:
            - string
            - "null"
        userAgent:
          type:
            - string
            - "null"
        timestamp:
          type: string
          format: date-time
        metadataJson:
          type:
            - string
            - "null"

    AuthAuditListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuthAuditEntryDto"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Auth ──────────────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    TokenResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn, mustResetPassword, tokenType, scope]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int32
        mustResetPassword:
          type: boolean
        tokenType:
          type: string
        scope:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    CreateApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
        bypassRateLimit:
          type: boolean
          default: false

    ApiKeyResponse:
      type: object
      required: [id, name, createdAt, isRevoked, bypassRateLimit]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type:
            - string
            - "null"
          format: date-time
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
        isRevoked:
          type: boolean
        bypassRateLimit:
          type: boolean

    CreateApiKeyResponse:
      type: object
      required: [id, name, rawKey, createdAt, bypassRateLimit]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        rawKey:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
        bypassRateLimit:
          type: boolean

    UserSummaryResponse:
      type: object
      required: [id, email, roles, isDisabled, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type:
            - string
            - "null"
        lastName:
          type:
            - string
            - "null"
        roles:
          type: array
          items:
            type: string
        isDisabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type:
            - string
            - "null"
          format: date-time

    UserListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserSummaryResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    UserRolesResponse:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            type: string

    CreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
        password:
          type: string
        role:
          type: string
        firstName:
          type:
            - string
            - "null"
        lastName:
          type:
            - string
            - "null"

    UpdateUserRequest:
      type: object
      required: [email, role, isDisabled]
      properties:
        email:
          type: string
        role:
          type: string
        isDisabled:
          type: boolean
        firstName:
          type:
            - string
            - "null"
        lastName:
          type:
            - string
            - "null"

    OAuthErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/OAuthErrorResponseError"
        error_description:
          type: string
        error_uri:
          type: string

    OAuthErrorResponseError:
      enum:
        - invalid_request
        - invalid_client
        - invalid_grant
        - unauthorized_client
        - unsupported_grant_type
        - invalid_scope

    TokenIntrospectionRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        tokenTypeHint:
          oneOf:
            - $ref: "#/components/schemas/TokenIntrospectionRequestTokenTypeHint"
            - type: "null"

    TokenIntrospectionRequestTokenTypeHint:
      enum:
        - AccessToken
        - RefreshToken

    TokenIntrospectionResponse:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        scope:
          type: string
        username:
          type: string
        tokenType:
          type: string
        exp:
          type: integer
          format: int64
        iat:
          type: integer
          format: int64
        sub:
          type: string

    TokenRevocationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        tokenTypeHint:
          oneOf:
            - $ref: "#/components/schemas/TokenRevocationRequestTokenTypeHint"
            - type: "null"

    TokenRevocationRequestTokenTypeHint:
      enum:
        - AccessToken
        - RefreshToken

    AdminResetPasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string

    EnumValuePair:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    EnumMetadataResponse:
      type: object
      required: [adjustmentTypes, authEventTypes, pricingModes, auditActions, entityTypes]
      properties:
        adjustmentTypes:
          type: array
          items:
            $ref: "#/components/schemas/EnumValuePair"
        authEventTypes:
          type: array
          items:
            $ref: "#/components/schemas/EnumValuePair"
        pricingModes:
          type: array
          items:
            $ref: "#/components/schemas/EnumValuePair"
        auditActions:
          type: array
          items:
            $ref: "#/components/schemas/EnumValuePair"
        entityTypes:
          type: array
          items:
            $ref: "#/components/schemas/EnumValuePair"

  headers:
    X-Resource-Id:
      description: Canonical identifier of the resource
      required: false
      schema:
        type: string
        format: uuid

  parameters:
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    SortBy:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
      description: Column name to sort by. Allowed values depend on the entity type.
    SortDirection:
      name: sortDirection
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
