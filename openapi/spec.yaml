        "404":
          description: Not Found
    put:
      operationId: UpdateSubcategory
      tags: [Subcategories]
      summary: Update a single subcategory
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
