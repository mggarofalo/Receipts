components:
  schemas:
    # ── Account ──────────────────────────────────

    CreateAccountRequest:
      type: object
      required: [accountCode, name, isActive]
      properties:
        accountCode:
          type: string
        name:
          type: string
        isActive:
          type: boolean

    UpdateAccountRequest:
      type: object
      required: [id, accountCode, name, isActive]
      properties:
        id:
          type: string
          format: uuid
        accountCode:
          type: string
        name:
          type: string
        isActive:
          type: boolean

    AccountResponse:
      type: object
      required: [id, accountCode, name, isActive]
      properties:
        id:
          type: string
          format: uuid
        accountCode:
          type: string
        name:
          type: string
        isActive:
          type: boolean

    AccountListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AccountResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Category ──────────────────────────────────

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"

    UpdateCategoryRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"

    CategoryResponse:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"

    CategoryListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CategoryResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Subcategory ─────────────────────────────

    CreateSubcategoryRequest:
      type: object
      required: [name, categoryId]
      properties:
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"

    UpdateSubcategoryRequest:
      type: object
      required: [id, name, categoryId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"

    SubcategoryResponse:
      type: object
      required: [id, name, categoryId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        categoryId:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"

    SubcategoryListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SubcategoryResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Item Template ──────────────────────────────

    CreateItemTemplateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type:
            - string
            - "null"
        defaultCategory:
          type:
            - string
            - "null"
        defaultSubcategory:
          type:
            - string
            - "null"
        defaultUnitPrice:
          type:
            - number
            - "null"
          format: double
        defaultPricingMode:
          type:
            - string
            - "null"
        defaultItemCode:
          type:
            - string
            - "null"

    UpdateItemTemplateRequest:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"
        defaultCategory:
          type:
            - string
            - "null"
        defaultSubcategory:
          type:
            - string
            - "null"
        defaultUnitPrice:
          type:
            - number
            - "null"
          format: double
        defaultPricingMode:
          type:
            - string
            - "null"
        defaultItemCode:
          type:
            - string
            - "null"

    ItemTemplateResponse:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"
        defaultCategory:
          type:
            - string
            - "null"
        defaultSubcategory:
          type:
            - string
            - "null"
        defaultUnitPrice:
          type:
            - number
            - "null"
          format: double
        defaultUnitPriceCurrency:
          type:
            - string
            - "null"
          description: "Currency code for the default unit price (e.g., 'USD')"
        defaultPricingMode:
          type:
            - string
            - "null"
        defaultItemCode:
          type:
            - string
            - "null"

    ItemTemplateListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ItemTemplateResponse"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
          type: integer
          format: int32

    # ── Receipt ──────────────────────────────────

    CreateReceiptRequest:
      type: object
      required: [location, date, taxAmount]
      properties:
        description:
          type:
            - string
            - "null"
        location:
          type: string
        date:
          type: string
          format: date
        taxAmount:
          type: number
          format: double

    UpdateReceiptRequest:
      type: object
      required: [id, location, date, taxAmount]
      properties:
        id:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"
        location:
          type: string
        date:
          type: string
          format: date
        taxAmount:
          type: number
          format: double

    ReceiptResponse:
      type: object
      required: [id, location, date, taxAmount]
      properties:
        id:
          type: string
          format: uuid
        description:
          type:
            - string
            - "null"
        location:
          type: string
        date:
          type: string
          format: date
        taxAmount:
          type: number
          format: double

    ReceiptListResponse:
      type: object
      required: [data, total, offset, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptResponse"
        total:
          type: integer
          format: int32
        offset:
