        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateCategory
      tags: [Categories]
      summary: Create a single category
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
  /api/categories/batch:
    post:
      operationId: CreateCategories
      tags: [Categories]
      summary: Create categories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
    put:
      operationId: UpdateCategories
      tags: [Categories]
      summary: Update categories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  # ──────────────────────────────────────────────
