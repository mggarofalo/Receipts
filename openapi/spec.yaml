          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/subcategories:
    get:
      operationId: GetAllSubcategories
      tags: [Subcategories]
      summary: Get all subcategories
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcategoryListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateSubcategory
      tags: [Subcategories]
      summary: Create a single subcategory
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubcategoryRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcategoryResponse"
  /api/subcategories/batch:
    post:
      operationId: CreateSubcategories
      tags: [Subcategories]
      summary: Create subcategories in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
