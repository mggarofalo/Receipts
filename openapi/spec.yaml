  # ──────────────────────────────────────────────

  /api/subcategories/{id}:
    get:
      operationId: GetSubcategoryById
      tags: [Subcategories]
      summary: Get a subcategory by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
