  # ──────────────────────────────────────────────
  # Users (admin-only)
  # ──────────────────────────────────────────────

  /api/users:
    get:
      operationId: ListUsers
      tags: [Users]
      summary: List all users with their roles
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateUser
      tags: [Users]
      summary: Create a new user (admin only)
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummaryResponse"
        "400":
          description: Bad Request

  /api/users/{userId}:
    get:
      operationId: GetUser
      tags: [Users]
      summary: Get a user by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummaryResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateUser
      tags: [Users]
      summary: Update a user (admin only)
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "404":
          description: Not Found
    delete:
      operationId: DeactivateUser
      tags: [Users]
      summary: Deactivate a user (admin only)
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "404":
          description: Not Found

  /api/users/{userId}/reset-password:
    post:
      operationId: AdminResetPassword
      tags: [Users]
      summary: Reset a user's password (admin only)
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminResetPasswordRequest"
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "404":
          description: Not Found

