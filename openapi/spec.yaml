openapi: 3.1.0
info:
  title: Receipts API
  version: 1.0.0
  description: |
    Receipts management API. Supports header-based versioning via the
    `api-version` header (e.g. `api-version: 1.0`). When omitted, the
    default version (currently 1.0) is assumed.

paths:
  /api/health:
    get:
      operationId: Get
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                {}

  # ──────────────────────────────────────────────
  # Metadata
  # ──────────────────────────────────────────────

  /api/metadata/enums:
    get:
      operationId: GetEnumMetadata
      tags: [Metadata]
      summary: Get all enum values with display labels
      security:
        - BearerAuth: []
        - ApiKey: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnumMetadataResponse"

  # ──────────────────────────────────────────────
  # Accounts
  # ──────────────────────────────────────────────

  /api/accounts/{id}:
    get:
      operationId: GetAccountById
      tags: [Accounts]
      summary: Get an account by ID
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateAccount
      tags: [Accounts]
      summary: Update a single account
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/accounts:
    get:
      operationId: GetAllAccounts
      tags: [Accounts]
      summary: Get all accounts
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateAccount
      tags: [Accounts]
      summary: Create a single account
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
  /api/accounts/batch:
    post:
      operationId: CreateAccounts
      tags: [Accounts]
      summary: Create accounts in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountResponse"
    put:
      operationId: UpdateAccounts
      tags: [Accounts]
      summary: Update accounts in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

