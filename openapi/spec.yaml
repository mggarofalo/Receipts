            type: string
            format: uuid
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"
        "404":
          description: Not Found
    put:
      operationId: UpdateReceipt
      tags: [Receipts]
      summary: Update a single receipt
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReceiptRequest"
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/receipts:
    get:
      operationId: GetAllReceipts
      tags: [Receipts]
      summary: Get all receipts
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
    post:
      operationId: CreateReceipt
      tags: [Receipts]
      summary: Create a single receipt
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReceiptRequest"
      responses:
        "200":
          description: OK
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"
    delete:
      operationId: DeleteReceipts
      tags: [Receipts]
      summary: Delete receipts
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
                format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /api/receipts/deleted:
    get:
      operationId: GetDeletedReceipts
      tags: [Receipts]
      summary: Get all soft-deleted receipts
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortDirection"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptListResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/receipts/{id}/restore:
    post:
      operationId: RestoreReceipt
      tags: [Receipts]
      summary: Restore a soft-deleted receipt
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
          headers:
            X-Resource-Id:
              $ref: "#/components/headers/X-Resource-Id"
        "404":
          description: Not Found

  /api/receipts/complete:
    post:
      operationId: CreateCompleteReceipt
      tags: [Receipts]
      summary: Create a receipt with transactions and items atomically
      description: >
        Creates a receipt along with its transactions and items in a single
        atomic operation. If any part fails, nothing is persisted.
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompleteReceiptRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteReceiptResponse"

  /api/receipts/batch:
    post:
      operationId: CreateReceipts
      tags: [Receipts]
      summary: Create receipts in batch
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CreateReceiptRequest"
      responses:
