openapi: 3.1.0
info:
  title: Receipts API
  version: 1.0.0
  description: |
    Receipts management API. Supports header-based versioning via the
    `api-version` header (e.g. `api-version: 1.0`). When omitted, the
    default version (currently 1.0) is assumed.

paths:
  /api/health:
    get:
      operationId: Get
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

