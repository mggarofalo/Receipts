    delete:
      operationId: RemoveUserRole
      tags: [UserRoles]
      summary: Remove role from user
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: role
          in: path
