# Prometheus configuration
# Receives metrics from OTel Collector via remote write
# Also scrapes its own metrics and the collector's metrics

global:
  scrape_interval: 30s
  evaluation_interval: 30s

# Enable remote write receiver to accept metrics from OTel Collector
# (enabled via --web.enable-remote-write-receiver flag)

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
