# Grafana dashboard provisioning
# Auto-loads dashboard JSON files on startup

apiVersion: 1

providers:
  - name: Receipts
    orgId: 1
    folder: Receipts
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
