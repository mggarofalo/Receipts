# Grafana alerting provisioning
# Defines alert rules for critical API failure conditions

apiVersion: 1

groups:
  - orgId: 1
    name: Receipts API Alerts
    folder: Receipts
    interval: 1m
    rules:
      - uid: receipts-5xx-rate
        title: Elevated 5xx Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum(rate(http_server_request_duration_seconds_count{job="receipts-api",http_response_status_code=~"5.."}[5m]))
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.1]
              refId: C
        for: 5m
        annotations:
          summary: "5xx error rate is above 0.1 req/s for 5 minutes"
          description: "The API is returning server errors at an elevated rate."
        labels:
          severity: critical

      - uid: receipts-high-latency
        title: High Request Latency (p95)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{job="receipts-api"}[5m])) by (le))
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [2.0]
              refId: C
        for: 5m
        annotations:
          summary: "p95 request latency exceeds 2 seconds"
          description: "API response times are abnormally high."
        labels:
          severity: warning

      - uid: receipts-service-down
        title: API Service Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum(rate(http_server_request_duration_seconds_count{job="receipts-api"}[5m]))
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [0.001]
              refId: C
        for: 5m
        annotations:
          summary: "No API traffic detected for 5 minutes"
          description: "The API appears to be down or unreachable."
        labels:
          severity: critical
